apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 280362093954.dkr.ecr.ap-south-1.amazonaws.com/dev-project:latest
        imagePullPolicy: Always 
        ports:
        - containerPort: 5000
